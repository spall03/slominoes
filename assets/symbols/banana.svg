<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="neon-banana" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="1 0 0 0 0  0 0.88 0 0 0  0 0 0.2 0 0  0 0 0 1 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#neon-banana)" fill="none" stroke="#FFE135" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- banana: thick crescent, tapered ends, like 🍌 -->
    <!-- outer curve (top edge) -->
    <path d="M16 44 Q12 36 16 26 Q22 14 34 10 Q42 8 48 12"/>
    <!-- inner curve (bottom edge) -->
    <path d="M18 48 Q16 42 20 32 Q26 22 36 18 Q42 14 48 16"/>
    <!-- top tip -->
    <path d="M48 12 Q50 14 48 16"/>
    <!-- bottom tip -->
    <path d="M16 44 Q16 46 18 48"/>
  </g>
</svg>
