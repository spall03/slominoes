<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="neon-apple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0.2 0 0 0 0  0 0.8 0 0 0  0 0 0.2 0 0  0 0 0 1 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#neon-apple)" fill="none" stroke="#44CC44" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- stem -->
    <path d="M32 14 Q33 8 36 6"/>
    <!-- leaf -->
    <path d="M34 10 Q40 6 42 10 Q40 14 34 10"/>
    <!-- apple body — two lobes with indent at top -->
    <path d="M24 18 Q14 22 14 36 Q14 52 26 54 Q32 56 38 54 Q50 52 50 36 Q50 22 40 18 Q36 16 32 18 Q28 16 24 18Z"/>
  </g>
</svg>
