<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="neon-vine" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0.1 0 0 0 0  0 0.7 0 0 0  0 0 0.2 0 0  0 0 0 1 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#neon-vine)" fill="none" stroke="#22BB44" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- main stem — S-curve -->
    <path d="M28 56 Q20 44 28 34 Q36 24 28 14 Q26 10 22 8"/>
    <!-- leaf left -->
    <path d="M24 42 Q14 38 16 30 Q18 34 24 36"/>
    <!-- leaf right -->
    <path d="M32 26 Q42 22 44 14 Q40 20 34 22"/>
    <!-- tendril -->
    <path d="M22 8 Q18 6 16 10"/>
  </g>
</svg>
