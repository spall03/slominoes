<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="neon-vine" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0.1 0 0 0 0  0 0.7 0 0 0  0 0 0.2 0 0  0 0 0 1 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#neon-vine)" fill="none" stroke="#22BB44" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- curling vine -->
    <path d="M16 52 Q20 36 32 32 Q44 28 40 16 Q38 10 32 12"/>
    <!-- leaf 1 -->
    <path d="M24 40 Q18 34 24 32"/>
    <!-- leaf 2 -->
    <path d="M40 22 Q46 18 44 24"/>
  </g>
</svg>
