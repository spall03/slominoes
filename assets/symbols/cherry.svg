<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="neon-pink" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="1 0 0 0 0  0 0.2 0 0 0  0 0 0.4 0 0  0 0 0 1 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#neon-pink)" fill="none" stroke="#FF3B82" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- stem -->
    <path d="M28 24 Q30 14 36 10"/>
    <path d="M36 24 Q34 14 36 10"/>
    <!-- leaf -->
    <path d="M36 10 Q42 8 40 14"/>
    <!-- left cherry -->
    <circle cx="24" cy="38" r="10"/>
    <!-- right cherry -->
    <circle cx="40" cy="38" r="10"/>
    <!-- stem to cherries -->
    <path d="M28 24 C26 28 24 30 24 32"/>
    <path d="M36 24 C38 28 40 30 40 32"/>
  </g>
</svg>
