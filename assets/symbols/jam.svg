<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="neon-jam" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="1 0 0 0 0  0 0.2 0 0 0  0 0 0.6 0 0  0 0 0 1 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#neon-jam)" fill="none" stroke="#E040A0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- lid -->
    <rect x="18" y="14" width="28" height="8" rx="2"/>
    <!-- jar body -->
    <path d="M20 22 L20 50 Q20 54 24 54 L40 54 Q44 54 44 50 L44 22"/>
    <!-- label line -->
    <line x1="24" y1="36" x2="40" y2="36"/>
  </g>
</svg>
