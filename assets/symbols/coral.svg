<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="neon-coral" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="1 0 0 0 0  0 0.5 0 0 0  0 0 0.4 0 0  0 0 0 1 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#neon-coral)" fill="none" stroke="#FF7766" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- main trunk -->
    <path d="M32 56 L32 30"/>
    <!-- left branch -->
    <path d="M32 40 Q20 36 18 24 Q16 16 20 12"/>
    <!-- right branch -->
    <path d="M32 36 Q42 32 44 22 Q46 14 42 10"/>
    <!-- small branches -->
    <path d="M22 28 Q16 26 14 20"/>
    <path d="M40 26 Q46 24 48 18"/>
  </g>
</svg>
