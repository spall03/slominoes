<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="neon-coral" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="1 0 0 0 0  0 0.5 0 0 0  0 0 0.4 0 0  0 0 0 1 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#neon-coral)" fill="none" stroke="#FF7766" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- base -->
    <path d="M22 54 L42 54"/>
    <!-- center stalk -->
    <path d="M32 54 L32 28"/>
    <!-- center top — round bulb -->
    <circle cx="32" cy="22" r="6"/>
    <!-- left branch -->
    <path d="M32 40 Q22 36 18 28"/>
    <circle cx="16" cy="22" r="5"/>
    <!-- right branch -->
    <path d="M32 36 Q42 32 46 24"/>
    <circle cx="48" cy="18" r="5"/>
  </g>
</svg>
