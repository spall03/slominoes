<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <filter id="neon-egg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="1 0 0 0 0  0 0.98 0 0 0  0 0 0.8 0 0  0 0 0 1 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#neon-egg)" fill="none" stroke="#FFFACD" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- egg shape -->
    <path d="M32 8 Q14 24 14 40 Q14 56 32 56 Q50 56 50 40 Q50 24 32 8Z"/>
  </g>
</svg>
