<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #060614;
    font-family: 'Space Grotesk', sans-serif;
    color: #fff;
    max-width: 400px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(6,6,20,0.85);
  }

  .modal {
    position: relative;
    z-index: 1;
    border: 1px solid #ffd700;
    box-shadow: 0 0 40px rgba(255,215,0,0.2), 0 0 80px rgba(255,215,0,0.1), inset 0 0 20px rgba(255,215,0,0.03);
    border-radius: 16px;
    padding: 40px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    max-width: 340px;
    width: 100%;
    background: #0a0a1e;
  }

  .modal-title {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: #ffd700;
    text-shadow: 0 0 20px rgba(255,215,0,0.5), 0 0 40px rgba(255,215,0,0.2);
  }

  .icon-container {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 2px solid rgba(187,187,255,0.3);
    box-shadow: 0 0 30px rgba(187,187,255,0.3), 0 0 60px rgba(187,187,255,0.1);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 8px 0;
  }
  .icon-container img {
    width: 64px;
    height: 64px;
  }

  .symbol-name {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 6px;
    text-transform: uppercase;
    text-shadow: 0 0 16px rgba(187,187,255,0.4);
    color: #BBBBFF;
  }

  .stats {
    font-size: 12px;
    color: #555;
    letter-spacing: 2px;
  }

  .ability {
    font-size: 13px;
    color: #00E5FF;
    text-align: center;
    line-height: 1.5;
    text-shadow: 0 0 8px rgba(0,229,255,0.3);
    padding: 0 8px;
  }

  .divider {
    width: 60%;
    height: 1px;
    background: #1e1e3a;
    margin: 4px 0;
  }

  .flavor {
    font-size: 11px;
    color: #444;
    font-style: italic;
    text-align: center;
  }

  .continue-btn {
    background: transparent;
    border: 2px solid #00E5FF;
    box-shadow: 0 0 16px rgba(0,229,255,0.3), inset 0 0 12px rgba(0,229,255,0.05);
    color: #00E5FF;
    font-family: inherit;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 12px 48px;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 8px;
  }
</style>
</head>
<body>

<div class="overlay"></div>

<div class="modal">
  <div class="modal-title">New Symbol Unlocked</div>

  <div class="icon-container">
    <img src="../../assets/symbols/ghost.svg">
  </div>

  <div class="symbol-name">Ghost</div>
  <div class="stats">MATCH 3 · 30PTS · FREQ 2</div>

  <div class="ability">Ghost cells don't lock when matched — stays respinnable</div>

  <div class="divider"></div>

  <div class="flavor">"You filled the entire line."</div>

  <button class="continue-btn">Continue</button>
</div>

</body>
</html>
